# ============================================================
# Matched-compute agent — information budget control
# Uniform low-res input with same total information as foveated agent
# ============================================================

defaults:
  - base

run_name: matched_compute_agent

foveation:
  enabled: false
  gaze_action: false

env:
  image_size: 32                   # CNN processes 32×32 images
  matched_compute: true            # Flag: render at 64×64, downsample via wrapper
  # The total pixel information ≈ foveated agent's average

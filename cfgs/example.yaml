# Example experiment configuration
# Copy and modify for your own experiments

run_name: auto
output_dir: ./outputs/auto

# Global variables
global_vars:
  batch_size: 32          # per GPU
  max_seq_len: 256
  image_size: 224

# Training
batch_size: ${global_vars.batch_size}
num_epochs: 100
lr: 0.0003                # Max learning rate
min_lr: 0.000001          # Min learning rate after cosine decay
warmup_epochs: 5
weight_decay: 0.05
clip_grad: 1.0
dtype: fp16               # fp16 on V100s, bf16 on A100s

# Evaluation
eval_freq: 5              # Evaluate every N epochs
save_ckpt_freq: 10        # Save checkpoint every N epochs

# Logging
log_wandb: True
wandb_project: CS503_Project
wandb_entity: alun-xu-epfl
wandb_run_name: auto

# Checkpoint (optional — set to resume from a previous run)
# resume_from: /scratch/wxu/CS503_Project/checkpoints/run_name/last.pt

# Model config — replace with your actual model
model_config:
  _target_: src.models.ExampleModel
  # Add model hyperparameters here
  dim: 512
  depth: 8
  num_classes: 10

# Dataset config — replace with your actual dataset
train_dataset_config:
  _target_: src.data.ExampleDataset
  split: train
  # Add dataset-specific params here

eval_dataset_config:
  _target_: src.data.ExampleDataset
  split: val

# Dataloader config
dataloader_config:
  batch_size: ${global_vars.batch_size}
  num_workers: 8
  pin_memory: True
  shuffle: True

# @package _global_
#
# Wijmans-faithful blind PointGoal navigator on Gibson.
#
# Replicates Section A.1 of Wijmans et al. (ICLR 2023):
#   - Sensors: g (goal in start frame), GPS, compass, close-to-goal indicator
#     (no `pointgoal_with_gps_compass` — we want the agent to do path
#     integration internally)
#   - Reward shaping: success_reward = 2.5, slack_reward = -0.001
#   - Max episode length: 2000 steps
#   - Architecture: 3-layer LSTM-512, prev-action embedding, each sensor → 32-d
#     (handled by WijmansPointNavPolicy in src/habitat/wijmans_policy.py)
#
# Training set: Gibson-0+ (411 scenes, `train_extra_large` split from
# pointnav_gibson_0_plus_v1.zip). This is the largest publicly pre-built
# Gibson PointNav episode set — 5.7× more scene diversity than the 72-scene
# Gibson-4+ default. Run scripts/cluster/download_gibson_0plus.sh once on
# the cluster to install it before training.
#
# Submit:
#   sbatch scripts/cluster/submit_habitat.sh pointnav/ddppo_pointnav_blind_gibson

defaults:
  - /benchmark/nav/pointnav: pointnav_gibson
  - /habitat_baselines: habitat_baselines_rl_config_base
  # Override the default lab sensor stack: drop pointgoal_with_gps_compass,
  # add gps + compass + the two Wijmans-specific sensors.
  - override /habitat/task/lab_sensors:
      - gps_sensor
      - compass_sensor
      - goal_in_start_frame_sensor
      - close_to_goal_indicator_sensor
  - _self_

habitat:
  environment:
    max_episode_steps: 2000        # Wijmans uses 2000 (we previously had 500)
  task:
    success_reward: 2.5            # Wijmans (matches Habitat default)
    slack_reward: -0.001           # Wijmans (Habitat default is -0.01, 10x larger)
    measurements:
      success:
        success_distance: 0.2      # Wijmans (matches Habitat default)
  dataset:
    # Wijmans 2023 A.1: train on 411 Gibson + 72 MP3D scenes. We use the
    # pre-built Gibson-0+ (411) and MP3D train (61 available) merged via
    # symlinks at data/datasets/pointnav/mp3d_gibson/v1/train/. 472 total.
    data_path: data/datasets/pointnav/mp3d_gibson/v1/{split}/{split}.json.gz
    split: train

habitat_baselines:
  verbose: False
  trainer_name: "ddppo"
  torch_gpu_id: 0
  tensorboard_dir: "tb"
  video_dir: "video_dir"
  eval_ckpt_path_dir: "data/checkpoints/blind_gibson"
  num_environments: 8              # 8 per worker × 2 workers = 16 total
  checkpoint_folder: "data/checkpoints/blind_gibson"
  num_updates: -1
  total_num_steps: 5.0e8           # 500M steps as a first target (Wijmans uses 2B)
  log_interval: 10
  num_checkpoints: 50
  force_torch_single_threaded: True
  force_blind_policy: True

  rl:
    policy:
      main_agent:
        name: "WijmansPointNavPolicy"     # custom policy with the 4-input architecture

    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1.0e-5
      max_grad_norm: 0.2
      num_steps: 256
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 512
      use_double_buffered_sampler: False

    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained: False
      pretrained_encoder: False
      train_encoder: True
      reset_critic: True
      backbone: resnet18
      rnn_type: LSTM
      num_recurrent_layers: 3

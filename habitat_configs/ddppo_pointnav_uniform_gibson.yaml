# @package _global_
#
# DD-PPO Uniform Vision Agent on Gibson
# Full RGB (128x128) + GPS+Compass, ResNet18 visual encoder, 3-layer LSTM-512
#
# Training (2 GPUs):
#   sbatch submit_habitat.sh pointnav/ddppo_pointnav_uniform_gibson

defaults:
  - /benchmark/nav/pointnav: pointnav_gibson
  - /habitat_baselines: habitat_baselines_rl_config_base
  - _self_

habitat:
  environment:
    max_episode_steps: 500
  simulator:
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            height: 128
            width: 128

habitat_baselines:
  verbose: False
  trainer_name: "ddppo"
  torch_gpu_id: 0
  tensorboard_dir: "tb"
  video_dir: "video_dir"
  eval_ckpt_path_dir: "data/checkpoints/uniform_gibson"
  num_environments: 6               # fewer than blind (RGB uses more memory)
  checkpoint_folder: "data/checkpoints/uniform_gibson"
  num_updates: -1
  total_num_steps: 5.0e8
  log_interval: 10
  num_checkpoints: 50
  force_torch_single_threaded: True
  force_blind_policy: False

  rl:
    policy:
      main_agent:
        name: "PointNavResNetPolicy"

    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1.0e-5
      max_grad_norm: 0.2
      num_steps: 128            # shorter rollouts for memory (RGB buffers)
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 512
      use_double_buffered_sampler: False

    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained: False
      pretrained_encoder: False
      train_encoder: True
      reset_critic: True
      backbone: resnet18
      rnn_type: LSTM
      num_recurrent_layers: 3
